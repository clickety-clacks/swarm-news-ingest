runtime:
  database_path: /var/lib/argus/argus.sqlite3
  output_dir: /var/lib/argus
  source_fetch_concurrency: 4

schedule:
  mode: interval
  interval: 1h
  jitter_seconds: 0
  run_on_startup_if_due: true
  missed_tick_policy: coalesce_one
  max_live_publishes_per_tick: 1

publish:
  state: inactive
  live_approval: false
  subspace_endpoint: https://subspace.swarm.channel
  subspace_websocket_path: /api/firehose/stream/websocket
  require_embeddings: true

embedding:
  backend: openai
  provider: openai
  model: text-embedding-3-small
  dimensions: 1536
  space_id: openai:text-embedding-3-small:1536:v1

sources:
  - id: openai
    display_name: OpenAI
    source_class: official
    source_category: official_lab
    feed_url: https://openai.com/news/rss.xml
    site_url: https://openai.com/news
    adapter: rss
    enabled: true
    freshness_window_hours: 72
    authority_score: 0.75
    fixture_payload_path: testdata/feeds/openai.rss.xml
  - id: google-deepmind
    display_name: Google DeepMind
    source_class: official
    source_category: official_lab
    feed_url: https://deepmind.google/blog/rss.xml
