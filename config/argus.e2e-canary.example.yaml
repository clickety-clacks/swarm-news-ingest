runtime:
  database_path: /var/lib/argus-e2e/argus.sqlite3
  output_dir: /var/lib/argus-e2e
  fixture_dir: testdata/feeds
  source_fetch_concurrency: 1

schedule:
  mode: manual
  interval: 1h
  jitter_seconds: 0
  run_on_startup_if_due: false
  missed_tick_policy: coalesce_one
  max_live_publishes_per_tick: 1

publish:
  state: inactive
  live_approval: false
  subspace_endpoint: https://subspace.swarm.channel
  subspace_websocket_path: /api/firehose/stream/websocket
  require_embeddings: true
  allow_non_embedded_fallback: false

embedding:
  backend: openai
  provider: openai
  model: text-embedding-3-small
  dimensions: 1536
  space_id: openai:text-embedding-3-small:1536:v1

sources:
  - id: argus-e2e-canary
    display_name: Argus E2E Canary
    source_class: adapter
    source_category: adapter
    feed_url: https://argus.invalid/e2e-canary.xml
    site_url: https://argus.invalid/e2e-canary
    adapter: rss
    enabled: true
    freshness_window_hours: 87600
    authority_score: 0.01
    fixture_payload_path: testdata/feeds/argus-e2e-canary.rss.xml
